<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="32" height="32">
  <defs>
    <linearGradient id="sun" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="cloud" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#93C5FD"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <g filter="url(#shadow)">
    <!-- Sun -->
    <circle cx="42" cy="24" r="12" fill="url(#sun)"/>
    
    <!-- Cloud -->
    <!-- Left bump -->
    <circle cx="24" cy="40" r="10" fill="url(#cloud)"/>
    <!-- Center large bump -->
    <circle cx="36" cy="34" r="14" fill="url(#cloud)"/>
    <!-- Right bump -->
    <circle cx="48" cy="42" r="8" fill="url(#cloud)"/>
    <!-- Base -->
    <rect x="24" y="36" width="24" height="14" fill="url(#cloud)"/>
  </g>
</svg>